x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - brandos_data:/app/data
      - brandos_knowledge:/app/knowledge
    environment:
      - BRANDOS_ENV=development
      - BRANDOS_DATABASE_URL=sqlite+aiosqlite:///app/data/brandos.db
      - BRANDOS_CHROMADB_HOST=chromadb
      - BRANDOS_CHROMADB_PORT=8000
      - BRANDOS_CORS_ORIGINS=http://localhost:3000
      - BRANDOS_LOG_LEVEL=DEBUG
      - BRANDOS_KNOWLEDGE_DIR=/app/knowledge
      - BRANDOS_DATA_DIR=/app/data
    depends_on:
      chromadb:
        condition: service_started
    restart: unless-stopped
    <<: *default-logging

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - WATCHPACK_POLLING=true
    depends_on:
      - backend
    restart: unless-stopped
    <<: *default-logging

  chromadb:
    image: chromadb/chroma:0.5.20
    ports:
      - "8001:8000"
    volumes:
      - chromadb_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
      - ANONYMIZED_TELEMETRY=FALSE
    restart: unless-stopped
    <<: *default-logging

  n8n:
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678
    restart: unless-stopped
    <<: *default-logging

volumes:
  brandos_data:
  brandos_knowledge:
  chromadb_data:
  n8n_data:

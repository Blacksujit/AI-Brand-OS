<body class="font-body-md text-on-surface selection:bg-primary-container selection:text-on-primary-container min-h-screen flex flex-col items-center justify-center relative overflow-hidden">
<!-- Background Layer -->

<!-- Primary Action: GitHub OAuth -->
<div class="flex flex-col gap-4">

<a class="font-label-caps text-label-caps text-on-surface-variant hover:text-primary transition-colors duration-200" href="#">Terminal Access</a>

<script>
    // Micro-interaction for the card to follow mouse subtle movement
    const card = document.querySelector('main > div');
    const container = document.querySelector('body');

    container.addEventListener('mousemove', (e) => {
      const xAxis = (window.innerWidth / 2 - e.pageX) / 100;
      const yAxis = (window.innerHeight / 2 - e.pageY) / 100;
      card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
    });

    container.addEventListener('mouseenter', () => {
      card.style.transition = 'none';
    });

    container.addEventListener('mouseleave', () => {
      card.style.transition = 'all 0.5s ease';
      card.style.transform = `rotateY(0deg) rotateX(0deg)`;
    });
  </script>
